<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoAlerta - Horarios</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <nav class="menu" id="menuDinamico"></nav>
    <main class="contenido">
        <h1><i class="fas fa-truck-moving" style="color: var(--primary);"></i> Planificación y Frecuencias de Recolección</h1>
        <p style="color:var(--text-muted); margin-bottom:20px;">Optimización horaria de recojo de residuos.</p>
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Zona Operativa</th><th>Frecuencia</th><th>Horario Fijo</th></tr>
                </thead>
                <tbody>
                    <tr><td><strong>Cercado San Sebastián</strong></td><td>Lunes - Miércoles - Viernes</td><td><span class="estado-badge" style="background:#e0f2fe; color:#0369a1; padding: 5px 10px; border-radius: 12px; font-weight: 600;">19:30 Hrs</span></td></tr>
                    <tr><td><strong>Sector Urbano Norte</strong></td><td>Martes - Jueves - Sábado</td><td><span class="estado-badge" style="background:#e0f2fe; color:#0369a1; padding: 5px 10px; border-radius: 12px; font-weight: 600;">20:00 Hrs</span></td></tr>
                    <tr><td><strong>Zona Industrial Sur</strong></td><td>Lunes a Sábado</td><td><span class="estado-badge" style="background:#e0f2fe; color:#0369a1; padding: 5px 10px; border-radius: 12px; font-weight: 600;">22:00 Hrs</span></td></tr>
                </tbody>
            </table>
        </div>
    </main>
    <script src="js/model.js"></script>
    <script src="js/view.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const model = new EcoAlertaModel();
            const view = new EcoAlertaView();
            view.initMenu(model.isLoggedIn());
        });
    </script>
</body>
</html>
