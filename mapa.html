<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoAlerta - Mapa Urbano</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="css/estilos.css">
    <style>
        #mapaBox {
            height: 73vh;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            z-index: 1;
        }
        .leaflet-popup-content {
            color: #1e293b;
        }
    </style>
</head>
<body>
    <nav class="menu" id="menuDinamico"></nav>
    <main class="contenido">
        <h1>🗺️ GIS - Servidor de Coordenadas Geográficas</h1>
        <p style="color:var(--text-muted); margin-bottom:20px;">Puntos críticos mapeados en tiempo real.</p>
        <div id="mapaBox"></div>
    </main>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/model.js"></script>
    <script src="js/view.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const model = new EcoAlertaModel();
            const view = new EcoAlertaView();
            view.initMenu(model.isLoggedIn());

            // Inicializar mapa
            const map = L.map("mapaBox").setView([-13.5336, -71.9392], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);

            // Cargar reportes
            const reportes = model.getAll();
            reportes.forEach(r => {
                const imgHtml = r.imagen 
                    ? `<br><img src="${r.imagen}" style="width:100%; max-height:150px; border-radius:6px; margin-top:5px; object-fit:cover;">` 
                    : '';
                
                const estadoColor = r.estado === 'Pendiente' ? '#ef4444' : 
                                   r.estado === 'Atendido' ? '#10b981' : '#64748b';

                L.marker([r.lat, r.lng])
                    .addTo(map)
                    .bindPopup(`
                        <b>📍 ${view.escapeXSS(r.referencia)}</b>
                        <br>${view.escapeXSS(r.descripcion)}
                        <br><span style="display:inline-block; padding:2px 10px; border-radius:12px; background:${estadoColor}; color:white; font-size:12px; font-weight:600; margin-top:5px;">${r.estado}</span>
                        ${imgHtml}
                        <br><small style="color:#64748b;">${r.fecha}</small>
                    `);
            });
        });
    </script>
</body>
</html>
