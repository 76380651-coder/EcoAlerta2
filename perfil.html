<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoAlerta - Administración</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <nav class="menu" id="menuDinamico"></nav>
    <main class="contenido">
        <header style="margin-bottom:40px; display:flex; justify-content:space-between; align-items:center;">
            <div>
                <h1>Panel Operativo Municipal</h1>
                <p style="color:var(--text-muted); font-size:15px;">Control de fiscalización, despliegue de camiones e inspección de fotos.</p>
            </div>
            <div class="header-user-card">
                <i class="fas fa-user-shield" style="color: var(--primary-light)"></i> <span id="nombreUsuario">Cargando...</span>
            </div>
        </header>
        <section class="table-container">
            <h2 style="font-size:18px; font-weight:700; margin-bottom:20px; color:var(--primary);">Bandeja de Fiscalización Técnica</h2>
            <table>
                <thead>
                    <tr>
                        <th style="width:80px;">Foto</th> <th>Ubicación</th> <th>Observaciones</th> <th style="width:180px;">Cambiar Estado</th> <th style="text-align:center; width:80px;">Acción</th>
                    </tr>
                </thead>
                <tbody id="tablaReportesBody"></tbody>
            </table>
        </section>
    </main>
    <script src="js/model.js"></script>
    <script src="js/view.js"></script>
    <script src="js/controller.js"></script>
</body>
</html>
