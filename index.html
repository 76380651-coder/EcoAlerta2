<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoAlerta - Panel de Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="css/estilos.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <nav class="menu" id="menuDinamico"></nav>

    <main class="contenido" id="contenedorPrincipal">
        
        <header style="margin-bottom: 30px;">
            <h1 id="tituloConsola" style="font-size: 28px; font-weight: 800; color: #ffffff; margin-bottom: 6px;">Dashboard Público</h1>
            <p id="subtituloConsola" style="color: #94a3b8; font-size: 14px;">Monitoreo ciudadano de alertas sanitarias.</p>
        </header>

        <div id="panelAnaliticaMunicipal"></div>

        <section class="tarjetas" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 30px;">
            <div class="tarjeta" style="background: #1e293b; padding: 20px; border-radius: 12px; border-left: 5px solid #10b981;">
                <h3 id="totalReportes" style="font-size: 24px; color: #fff; margin-bottom: 5px;">0</h3> 
                <p style="color: #94a3b8; font-size: 13px;">Alertas Totales</p>
            </div>
            <div class="tarjeta" style="background: #1e293b; padding: 20px; border-radius: 12px; border-left: 5px solid #ef4444;">
                <h3 id="totalPendientes" style="font-size: 24px; color: #ef4444; margin-bottom: 5px;">0</h3> 
                <p style="color: #94a3b8; font-size: 13px;">En Espera</p>
            </div>
            <div class="tarjeta" style="background: #1e293b; padding: 20px; border-radius: 12px; border-left: 5px solid #10b981;">
                <h3 id="totalAtendidos" style="font-size: 24px; color: #10b981; margin-bottom: 5px;">0</h3> 
                <p style="color: #94a3b8; font-size: 13px;">Atendidos</p>
            </div>
        </section>

        <section class="table-container" style="background: #1e293b; padding: 20px; border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);">
            <h2 id="tituloTabla" style="font-size: 18px; margin-bottom: 15px; color: #10b981; font-weight: 700;">Historial de Incidencias</h2>
            <div style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse; text-align: left; color: #e2e8f0;">
                    <thead>
                        <tr style="border-bottom: 1px solid #334155;">
                            <th style="padding: 12px;">Evidencia</th> 
                            <th style="padding: 12px;">Ubicación</th> 
                            <th style="padding: 12px;">Descripción</th> 
                            <th style="padding: 12px;">Fecha</th> 
                            <th style="padding: 12px;">Estado</th>
                        </tr>
                    </thead>
                    <tbody id="tablaReportesBody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="js/model.js"></script>
    <script src="js/view.js"></script>
    <script src="js/controller.js"></script>
</body>
</html>
