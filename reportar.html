<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoAlerta - Crear Reporte</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <nav class="menu" id="menuDinamico"></nav>

    <main class="contenido">
        
        <header style="margin-bottom: 35px;">
            <h1 style="font-size: 28px; font-weight: 800; color: #ffffff; margin-bottom: 6px;">
                📸 Enviar Alerta Sanitaria
            </h1>
            <p style="color: #94a3b8; font-size: 14px;">
                Su reporte se transmitirá de inmediato a las cuadrillas de limpieza.
            </p>
        </header>

        <form class="form-reportar" id="formIncidencia">
            
            <div class="form-group">
                <label for="txtReferencia">
                    <i class="fas fa-map-marker-alt"></i> Ubicación Geográfica / Dirección
                </label>
                <input type="text" id="txtReferencia" class="form-control" placeholder="Ej. Esquina Calle San José" required>
            </div>

            <button type="button" id="btnGeolocalizar" class="btn-gps">
                <i class="fas fa-crosshairs"></i> Capturar Coordenadas por GPS
            </button>
            <div id="coordenadasDisplay" style="color: var(--text-muted); font-size: 13px; margin-top: -10px;"></div>

            <div class="form-row">
                
                <div class="form-group">
                    <label for="txtDescripcion">
                        <i class="fas fa-align-left"></i> Detalle e Indicaciones del Problema
                    </label>
                    <textarea id="txtDescripcion" class="form-control" placeholder="Indique tipos de residuos o dimensiones aproximadas..." required></textarea>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-camera"></i> Subir Fotografía de Prueba</label>
                    <div class="file-input-wrapper">
                        <i class="fas fa-cloud-upload-alt" style="font-size: 28px; color: var(--primary); margin-bottom: 10px;"></i>
                        <p style="font-size: 14px; color: #f8fafc; font-weight: 500; margin: 0;">Haga clic aquí para examinar archivos</p>
                        <p style="font-size: 12px; color: #64748b; margin-top: 4px;">Formatos admitidos: JPG, PNG</p>
                        <input type="file" id="fileImagen" accept="image/*">
                    </div>
                    <img id="previewImagen" alt="Vista previa de la imagen">
                </div>

            </div>

            <button type="submit" class="btn-submit">
                <i class="fas fa-paper-plane"></i> Despachar Reporte Oficial
            </button>

        </form>
    </main>

    <script src="js/model.js"></script>
    <script src="js/view.js"></script>
    <script src="js/controller.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const model = new EcoAlertaModel();
            const view = new EcoAlertaView();
            view.initMenu(model.isLoggedIn());

            // Previsualización de imagen
            document.getElementById('fileImagen').addEventListener('change', function(e) {
                const preview = document.getElementById('previewImagen');
                if (this.files && this.files[0]) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        preview.src = event.target.result;
                        preview.style.display = 'block';
                    };
                    reader.readAsDataURL(this.files[0]);
                }
            });

            // Geolocalización
            let latGuardada = null;
            let lngGuardada = null;

            document.getElementById('btnGeolocalizar').addEventListener('click', function() {
                if (navigator.geolocation) {
                    this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Obteniendo ubicación...';
                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            latGuardada = pos.coords.latitude;
                            lngGuardada = pos.coords.longitude;
                            document.getElementById('coordenadasDisplay').innerHTML = 
                                `<i class="fas fa-check-circle" style="color: var(--primary);"></i> 
                                Coordenadas: ${latGuardada.toFixed(6)}, ${lngGuardada.toFixed(6)}`;
                            this.innerHTML = '<i class="fas fa-crosshairs"></i> Ubicación capturada ✅';
                            this.style.borderColor = 'var(--primary)';
                        },
                        () => {
                            this.innerHTML = '<i class="fas fa-crosshairs"></i> Capturar Coordenadas por GPS';
                            alert('❌ No se pudo obtener la ubicación. Verifica los permisos.');
                        }
                    );
                } else {
                    alert('❌ Tu navegador no soporta GPS.');
                }
            });

            // Envío del formulario
            document.getElementById('formIncidencia').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const referencia = document.getElementById('txtReferencia').value.trim();
                const descripcion = document.getElementById('txtDescripcion').value.trim();
                const fileInput = document.getElementById('fileImagen');

                if (!referencia || !descripcion) {
                    view.showToast('❌ Completa todos los campos obligatorios', 'error');
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(event) {
                    const imagen = event.target.result || null;
                    model.save(referencia, descripcion, imagen, latGuardada, lngGuardada);
                    view.showToast('🎉 ¡Reporte enviado con éxito!');
                    document.getElementById('formIncidencia').reset();
                    document.getElementById('previewImagen').style.display = 'none';
                    document.getElementById('coordenadasDisplay').innerHTML = '';
                    latGuardada = null;
                    lngGuardada = null;
                    document.getElementById('btnGeolocalizar').innerHTML = '<i class="fas fa-crosshairs"></i> Capturar Coordenadas por GPS';
                };

                if (fileInput.files[0]) {
                    reader.readAsDataURL(fileInput.files[0]);
                } else {
                    model.save(referencia, descripcion, null, latGuardada, lngGuardada);
                    view.showToast('🎉 ¡Reporte enviado con éxito!');
                    document.getElementById('formIncidencia').reset();
                    document.getElementById('previewImagen').style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
